name: "11 · Manual Test Run (workflow_dispatch)"

on:
  workflow_dispatch:  # only triggered manually — no push or schedule trigger
    inputs:  # these become a form in the GitHub Actions UI when you click "Run workflow"
      environment:
        description: "Target environment"  # label shown in the UI above the input
        type: choice  # renders as a dropdown
        required: true
        default: staging  # pre-selected value in the dropdown
        options: [staging, production, local]  # dropdown options

      browser:
        description: "Browser"
        type: choice
        required: true
        default: chromium
        options: [chromium, firefox, webkit, all]

      test-suite:
        description: "Suite"
        type: choice
        default: smoke
        options: [smoke, regression, full]

      headless:
        description: "Headless mode"
        type: boolean  # renders as a checkbox
        default: true

      test-filter:
        description: "Grep pattern (optional)"
        type: string  # renders as a free text field
        required: false  # user can leave it blank

jobs:
  run-tests:
    name: "${{ inputs.test-suite }} · ${{ inputs.browser }} · ${{ inputs.environment }}"  # dynamic job name shows exactly what was selected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install

      - name: Install Playwright
        run: |
          if [ "${{ inputs.browser }}" = "all" ]; then  # if user picked "all", install every browser
            npx playwright install --with-deps
          else
            npx playwright install --with-deps ${{ inputs.browser }}  # otherwise install only the selected one
          fi

      - name: Run tests
        env:
          BROWSER: ${{ inputs.browser == 'all' && '' || inputs.browser }}  # empty string tells playwright.config.ts to run all browser projects; otherwise just the one selected
          TARGET_ENV: ${{ inputs.environment }}
          HEADLESS: ${{ inputs.headless }}
          TEST_FILTER: ${{ inputs.test-filter }}  # passed as env var, not inline in the script — avoids script injection
          CI: "true"
        run: |
          if [ -n "$TEST_FILTER" ]; then  # if the user provided a filter, pass it to playwright as a grep pattern
            npm run test:e2e -- --grep "$TEST_FILTER"
          else
            npm run test:e2e  # no filter — run all tests
          fi

      - name: Upload report
        if: always()  # upload the report even if tests failed
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ inputs.browser }}-${{ inputs.environment }}-${{ github.run_id }}  # unique name per run so reports don't overwrite each other
          path: playwright-report/
          retention-days: 7

  production-alert:
    runs-on: ubuntu-latest
    needs: run-tests
    if: inputs.environment == 'production'  # only spin up this job if the user chose production
    steps:
      - run: echo "📢 Production test triggered by ${{ github.actor }}"  # github.actor is the username of whoever clicked "Run workflow"
