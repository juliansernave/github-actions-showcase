name: "11 · Manual Test Run (workflow_dispatch)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        default: staging
        options: [staging, production, local]

      browser:
        description: "Browser"
        type: choice
        required: true
        default: chromium
        options: [chromium, firefox, webkit, all]

      test-suite:
        description: "Suite"
        type: choice
        default: smoke
        options: [smoke, regression, full]

      headless:
        description: "Headless mode"
        type: boolean
        default: true

      test-filter:
        description: "Grep pattern (optional)"
        type: string
        required: false

jobs:
  run-tests:
    name: "${{ inputs.test-suite }} · ${{ inputs.browser }} · ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install

      - name: Install Playwright
        run: |
          if [ "${{ inputs.browser }}" = "all" ]; then
            npx playwright install --with-deps
          else
            npx playwright install --with-deps ${{ inputs.browser }}
          fi

      - name: Run tests
        env:
          BROWSER: ${{ inputs.browser == 'all' && '' || inputs.browser }}
          TARGET_ENV: ${{ inputs.environment }}
          HEADLESS: ${{ inputs.headless }}
          TEST_FILTER: ${{ inputs.test-filter }}  # env var, not inline — injection-safe
          CI: "true"
        run: |
          if [ -n "$TEST_FILTER" ]; then
            npm run test:e2e -- --grep "$TEST_FILTER"
          else
            npm run test:e2e
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ inputs.browser }}-${{ inputs.environment }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  production-alert:
    runs-on: ubuntu-latest
    needs: run-tests
    if: inputs.environment == 'production'
    steps:
      - run: echo "📢 Production test triggered by ${{ github.actor }}"
