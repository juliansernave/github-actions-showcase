name: "06 · Conditionals & Error Handling"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install

      - name: Stable tests
        id: unit  # id needed so we can check this step's outcome in later steps
        run: npm run test:unit

      - name: Flaky tests
        id: flaky
        continue-on-error: true  # this step is allowed to fail without failing the whole job
        run: npm run test:api
      # outcome    = what actually happened (success / failure)
      # conclusion = always 'success' when continue-on-error: true — GHA swallows the failure
      # always check outcome when you care about the real result

      - name: Report flaky result
        if: steps.flaky.outcome == 'failure'  # check outcome not conclusion — conclusion would always be 'success' here
        run: echo "⚠️ Flaky tests failed this run (non-blocking)"

      - name: Cleanup
        if: always()  # runs no matter what happened above — good for teardown and cleanup tasks
        run: echo "Cleanup runs regardless of outcome"

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: test-suite
    if: failure()  # this entire job only runs if a previous job in the chain failed
    steps:
      - run: echo "🚨 Pipeline failed — notify team"

  final-report:
    runs-on: ubuntu-latest
    needs: test-suite
    if: always()  # always runs — good for final status reporting regardless of outcome
    steps:
      - run: echo "Finished with status — ${{ needs.test-suite.result }}"  # reads the overall result of the test-suite job
