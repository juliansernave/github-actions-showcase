name: "06 · Conditionals & Error Handling"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install

      - name: Stable tests
        id: unit
        run: npm run test:unit

      - name: Flaky tests
        id: flaky
        continue-on-error: true
        run: npm run test:api
      # outcome = what actually happened (success/failure)
      # conclusion = always 'success' when continue-on-error: true
      # Use outcome to react to real failures, not conclusion

      - name: Report flaky result
        if: steps.flaky.outcome == 'failure'
        run: echo "⚠️ Flaky tests failed this run (non-blocking)"

      - name: Cleanup
        if: always()
        run: echo "Cleanup runs regardless of outcome"

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: test-suite
    if: failure()
    steps:
      - run: echo "🚨 Pipeline failed — notify team"

  final-report:
    runs-on: ubuntu-latest
    needs: test-suite
    if: always()
    steps:
      - run: echo "Finished with status — ${{ needs.test-suite.result }}"
