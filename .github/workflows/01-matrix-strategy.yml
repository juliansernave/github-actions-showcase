name: "01 · Matrix Strategy"

on:
  push:
    branches: [main]  # runs on every push to main
  workflow_dispatch:  # also lets you trigger it manually from the Actions tab

jobs:
  e2e-tests:
    name: "E2E · ${{ matrix.browser }} on ${{ matrix.os }}"  # dynamic name using matrix values — each cell gets its own label in the UI
    runs-on: ${{ matrix.os }}  # each cell gets its own runner based on the os value

    strategy:
      fail-fast: false  # keep running other cells even if one fails — crucial for test suites
      max-parallel: 4  # run at most 4 jobs at the same time — avoids burning too many runners at once
      matrix:
        os: [ubuntu-latest, windows-latest]  # two operating systems
        browser: [chromium, firefox, webkit]  # three browsers — GHA creates 2×3 = 6 jobs total
        exclude:
          - os: windows-latest
            browser: webkit  # webkit isn't supported on Windows so we drop those 2 cells

    steps:
      - uses: actions/checkout@v4  # checks out the repo code onto the runner

      - uses: actions/setup-node@v4  # installs Node.js
        with:
          node-version: "20"  # use Node 20
          cache: "npm"  # cache ~/.npm using package-lock.json hash as the key

      - run: npm install  # install dependencies

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}  # install the browser for this cell plus its system dependencies

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BROWSER: ${{ matrix.browser }}  # tells playwright.config.ts which browser project to run
          CI: "true"  # disables interactive features in CI environments

      - name: Upload report
        if: always()  # run this step even if previous steps failed
        uses: actions/upload-artifact@v4  # saves files so you can download them from the run page
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.os }}  # unique name per cell so reports don't overwrite each other
          path: playwright-report/  # folder Playwright writes its HTML report to
          retention-days: 7  # GitHub deletes the artifact after 7 days
