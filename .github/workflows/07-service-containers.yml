name: "07 · Service Containers"

# Key concepts:
#   services     — Docker containers that start alongside the job runner
#   options      — Docker flags: health checks, volume mounts, etc.
#   ports        — map container port to runner port (access via localhost)
#   health check — GHA waits until the container is ready before running steps
#
# Why service containers for QA?
#   - Run integration tests against a REAL database, not a mock
#   - Zero external infrastructure — the container is created and destroyed per run
#   - Multiple services in one job (Postgres + Redis here)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
        # GHA blocks until the health check passes — tests always start
        # with a ready database, no sleep/retry needed in the test code.

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - name: Run integration tests
        run: npm run test:integration
        env:
          # Services are reachable via localhost on the mapped port
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379

      - name: Verify Redis connectivity
        run: |
          sudo apt-get install -y redis-tools -q
          redis-cli -h 127.0.0.1 ping
