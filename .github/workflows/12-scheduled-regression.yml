name: "12 · Scheduled Nightly Regression"

on:
  schedule:
    - cron: "0 2 * * 1-5"  # 02:00 UTC, Mon–Fri (GitHub Actions cron is always UTC)
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npx playwright install --with-deps

      - name: Run full regression suite
        id: tests
        run: npm run test:e2e
        continue-on-error: true
        env:
          CI: "true"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      # Only notify on scheduled runs — on manual dispatch the user already knows
      - name: Post to Slack
        if: github.event_name == 'schedule'
        env:
          OUTCOME: ${{ steps.tests.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "Nightly: $OUTCOME — $RUN_URL"
          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-Type: application/json' \
          #   -d "{\"text\": \"Nightly regression *${OUTCOME}* → ${RUN_URL}\"}"

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
