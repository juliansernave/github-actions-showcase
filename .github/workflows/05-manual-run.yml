##
## Triggered manually from the GitHub Actions UI — the everyday QA tool.
## The inputs become a real form with dropdowns, a checkbox, and a text field.
## Uses the composite action for setup (same as the reusable runner) and adds
## dispatch-specific features like headless mode and test filtering.
## Fires a production alert job when production is targeted.
##

name: "05 · Manual Test Run"

on:
  workflow_dispatch:  # only triggered manually — no push or schedule
    inputs:
      environment:
        description: "Target environment"  # label shown above the input in the UI
        type: choice  # renders as a dropdown
        required: true
        default: staging
        options: [staging, production, local]

      browser:
        description: "Browser"
        type: choice
        required: true
        default: chromium
        options: [chromium, firefox, webkit]

      test-suite:
        description: "Suite"
        type: choice
        default: smoke
        options: [smoke, regression, full]

      headless:
        description: "Headless mode"
        type: boolean  # renders as a checkbox
        default: true

      test-filter:
        description: "Grep pattern (optional)"
        type: string  # renders as a free text field
        required: false

jobs:
  run-tests:
    name: "${{ inputs.test-suite }} · ${{ inputs.browser }} · ${{ inputs.environment }}"  # dynamic name shows exactly what was selected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-test-env  # same composite action as the reusable runner — consistent setup
        with:
          node-version: "20"

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ inputs.browser }}

      - name: Run tests
        env:
          BROWSER: ${{ inputs.browser }}
          TARGET_ENV: ${{ inputs.environment }}
          HEADLESS: ${{ inputs.headless }}
          TEST_FILTER: ${{ inputs.test-filter }}  # passed as env var, not interpolated inline — avoids script injection
          CI: "true"
        run: |
          if [ -n "$TEST_FILTER" ]; then  # if the user provided a filter, pass it to playwright as a grep pattern
            npm run test:e2e -- --grep "$TEST_FILTER"
          else
            npm run test:e2e
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-report-${{ inputs.browser }}-${{ inputs.environment }}-${{ github.run_id }}  # unique name per run
          path: playwright-report/
          retention-days: 7

  production-alert:
    runs-on: ubuntu-latest
    needs: run-tests
    if: inputs.environment == 'production'  # only spin up this job when production is targeted
    steps:
      - run: echo "📢 Production test triggered by ${{ github.actor }}"  # github.actor = username of whoever clicked Run workflow
