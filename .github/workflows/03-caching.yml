name: "03 · Caching"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Built-in shortcut: setup-node handles key generation and cache restore automatically
  builtin-cache:
    name: "Built-in cache"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm test

  # Manual cache: full control over path, key, and fallback strategy
  manual-cache:
    name: "Manual cache"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install (skipped on cache hit)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install

      - run: npm test
