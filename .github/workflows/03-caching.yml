name: "03 · Caching"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Approach A: the built-in shortcut — setup-node handles everything automatically
  builtin-cache:
    name: "Built-in cache"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"  # tells setup-node to cache ~/.npm automatically — hashes package-lock.json to build the key
      - run: npm install  # on cache hit this is much faster since packages are already cached
      - run: npm test

  # Approach B: manual cache — full control over what gets cached, the key, and the fallback
  manual-cache:
    name: "Manual cache"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # no cache: here — we handle it manually below

      - name: Cache node_modules
        id: node-cache  # give this step an id so we can read its outputs below
        uses: actions/cache@v4
        with:
          path: node_modules  # what folder to cache and restore
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}  # cache key — changes whenever package-lock.json changes, busting the cache
          restore-keys: |
            ${{ runner.os }}-node-  # fallback key — used if exact key misses, picks the most recent partial match

      - name: Install (skipped on cache hit)
        if: steps.node-cache.outputs.cache-hit != 'true'  # only run npm install if nothing was restored from cache
        run: npm install

      - run: npm test
