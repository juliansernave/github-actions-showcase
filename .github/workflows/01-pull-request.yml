##
## Runs on every push and pull request to main.
## Fast unit/API tests run first — if they fail, the expensive browser jobs are skipped entirely.
## E2E runs in parallel across 3 browsers using a matrix.
## Reports are always uploaded even on failure, and test counts flow between jobs via outputs.
##

name: "01 · Pull Request"

on:
  push:
    branches: [main]  # triggers on direct pushes to main
  pull_request:
    branches: [main]  # also triggers when a PR targets main
  workflow_dispatch:  # allows manual trigger from the Actions tab

jobs:
  unit-tests:
    name: "Unit & API tests"
    runs-on: ubuntu-latest
    outputs:  # expose step-level values to other jobs — step outputs don't flow automatically
      tests-passed: ${{ steps.results.outputs.tests_passed }}
      tests-failed: ${{ steps.results.outputs.tests_failed }}

    steps:
      - uses: actions/checkout@v4  # checks out the repo onto the runner
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"  # caches ~/.npm using package-lock.json hash — speeds up every run after the first
      - run: npm install

      - name: Run tests and capture counts
        id: results  # id needed so the outputs block above can reference this step
        run: |
          npm test -- --json --outputFile=jest-output.json 2>/dev/null || true  # || true so the script keeps going even if tests fail
          PASSED=$(node -e "try { const r=require('./jest-output.json'); process.stdout.write(String(r.numPassedTests||0)) } catch { process.stdout.write('0') }")
          FAILED=$(node -e "try { const r=require('./jest-output.json'); process.stdout.write(String(r.numFailedTests||0)) } catch { process.stdout.write('0') }")
          echo "tests_passed=${PASSED}" >> "$GITHUB_OUTPUT"  # write to $GITHUB_OUTPUT — this is how you set step outputs
          echo "tests_failed=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: Upload JUnit results
        if: always()  # upload even if tests failed — the report is most useful when things go wrong
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 14

  e2e-tests:
    name: "E2E · ${{ matrix.browser }}"
    runs-on: ubuntu-latest
    needs: unit-tests  # wait for unit tests before spinning up expensive browser runners
    if: needs.unit-tests.result == 'success'  # skip E2E entirely if unit tests failed — no point running UI tests on broken logic

    strategy:
      fail-fast: false  # keep running other browsers even if one fails — you want results from all of them
      matrix:
        browser: [chromium, firefox, webkit]  # GHA creates one job per browser, all running in parallel

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}  # install only the browser for this matrix cell

      - name: Run E2E tests
        run: npm run test:e2e
        continue-on-error: true  # don't cancel the other matrix cells if this browser fails
        env:
          BROWSER: ${{ matrix.browser }}  # picked up by playwright.config.ts to select the right browser project
          CI: "true"

      - name: Upload Playwright report
        if: always()  # upload even when tests failed — one artifact per browser so they don't overwrite each other
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  summary:
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always()  # always write the summary — even if e2e was skipped or failed
    steps:
      - name: Write step summary
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"  # $GITHUB_STEP_SUMMARY renders as markdown on the run page
          echo "| ✅ Passed | ❌ Failed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ needs.unit-tests.outputs.tests-passed }} | ${{ needs.unit-tests.outputs.tests-failed }} |" >> "$GITHUB_STEP_SUMMARY"  # reads job outputs via needs.<job>.outputs.<name>
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "E2E result: **${{ needs.e2e-tests.result }}**" >> "$GITHUB_STEP_SUMMARY"
