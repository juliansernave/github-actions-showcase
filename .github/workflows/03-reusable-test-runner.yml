##
## A parameterized test runner called by other workflows — never triggered directly.
## Accepts environment, suite, and browser as inputs so any caller gets the right
## tests against the right target without duplicating setup logic.
## Uses the composite action for consistent setup and returns a summary to the caller.
## See 04-deploy-pipeline.yml and 05-manual-run.yml for usage examples.
##

name: "03 · Reusable Test Runner"

on:
  workflow_call:  # this trigger means the workflow can only be called by another workflow, never run directly
    inputs:
      environment:
        type: string  # inputs must declare their type: string, boolean, or number
        required: true
      test-suite:
        type: string
        default: "smoke"  # caller can omit this and get smoke by default
      browser:
        type: string
        default: "chromium"
      node-version:
        type: string
        default: "20"
    outputs:
      test-summary:
        value: ${{ jobs.run.outputs.summary }}  # wires the job-level output back to the caller

jobs:
  run:
    name: "[${{ inputs.environment }}] ${{ inputs.test-suite }} — ${{ inputs.browser }}"  # dynamic name shows what the caller passed in
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.tests.outputs.summary }}  # promotes the step output to job level so the workflow output above can reach it

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-test-env  # composite action handles node setup, npm install, and step summary
        with:
          node-version: ${{ inputs.node-version }}  # use whatever version the caller passed in

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ inputs.browser }}  # install only the browser the caller requested

      - name: Run ${{ inputs.test-suite }} tests
        id: tests  # id needed so the outputs block above can reference this step
        run: |
          npm run test:e2e
          echo "summary=${{ inputs.test-suite }} PASSED on ${{ inputs.environment }}" >> "$GITHUB_OUTPUT"  # result the caller can read via needs.<job>.outputs.test-summary
        env:
          BROWSER: ${{ inputs.browser }}
          TARGET_ENV: ${{ inputs.environment }}  # make the environment available to the test process
          CI: "true"

      - name: Upload report
        if: always()  # upload even on failure
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ inputs.environment }}-${{ inputs.test-suite }}-${{ inputs.browser }}  # unique name per caller invocation
          path: playwright-report/
          retention-days: 7
