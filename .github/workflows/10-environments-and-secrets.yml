name: "10 · Environments & Deployment Gates"

# Key concepts:
#   environment:        — attach a job to a named GitHub Environment
#   environment secrets — secrets scoped to an environment (staging != production)
#   protection rules    — require a human reviewer before the job runs
#   deployment URL      — shown in the GitHub UI on the repo home page
#
# Setup (can't be done in YAML — use the GitHub UI):
#   Settings > Environments > New environment
#   For 'production': add yourself as a Required reviewer
#
# This is where QA becomes a formal gate in the pipeline:
# no one deploys to production without a reviewer approving the deployment.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: "Run tests"
    runs-on: ubuntu-latest
    # No environment — tests always run without a gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm test

  deploy-staging:
    name: "Deploy to staging"
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: staging
      url: https://staging.example.com   # shown as a link in the GitHub UI
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          # Secrets are scoped to this environment:
          # echo "DB: ${{ secrets.DATABASE_URL }}"   (masked, staging value)
          echo "✅ Deployed to staging"

  deploy-production:
    name: "Deploy to production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    # This job PAUSES here until a required reviewer clicks Approve in the UI.
    # The runner isn't even allocated until approval is granted.
    # Configure the reviewer at: Settings > Environments > production > Required reviewers
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Different secrets from staging (different DATABASE_URL, API keys, etc.):
          # echo "DB: ${{ secrets.DATABASE_URL }}"   (masked, production value)
          echo "✅ Deployed to production"
