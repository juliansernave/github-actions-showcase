name: "10 · Environments & Deployment Gates"

# Requires setup in GitHub UI:
# Settings > Environments > production > Required reviewers (add yourself)
# The deploy-production job will pause until a reviewer approves.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install && npm test  # run tests before any deployment happens

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test  # only deploy if tests passed
    environment:
      name: staging  # links this job to the 'staging' environment in GitHub settings
      url: https://staging.example.com  # shown as a clickable link on the run page and repo homepage
    steps:
      - run: echo "Deployed to staging ✅"
        # ${{ secrets.DATABASE_URL }} here resolves to the staging-scoped value

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging  # only deploy to prod if staging succeeded
    environment:
      name: production  # if this environment has required reviewers configured, the job pauses here waiting for approval
      url: https://example.com
    steps:
      - run: echo "Deployed to production ✅"
        # ${{ secrets.DATABASE_URL }} here resolves to the production-scoped value — same secret name, different value
