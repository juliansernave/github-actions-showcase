name: "10 · Environments & Deployment Gates"

# Requires setup in GitHub UI:
# Settings > Environments > production > Required reviewers (add yourself)
# The deploy-production job will pause until a reviewer approves.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install && npm test

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - run: echo "Deployed to staging ✅"
        # secrets.DATABASE_URL here is the staging value

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://example.com
    steps:
      - run: echo "Deployed to production ✅"
        # secrets.DATABASE_URL here is the production value (different secret, same name)
