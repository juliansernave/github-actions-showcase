name: "05 · Reusable Workflow (Caller)"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-staging:
    uses: ./.github/workflows/05-reusable-workflow-definition.yml  # call the reusable workflow — ./ means same repo
    with:  # pass inputs defined in the workflow_call trigger of the definition
      environment: staging
      test-suite: smoke
    secrets: inherit  # forward all secrets from this workflow to the reusable one automatically

  regression-staging:
    needs: smoke-staging  # only run regression if smoke passed first
    uses: ./.github/workflows/05-reusable-workflow-definition.yml
    with:
      environment: staging
      test-suite: regression
    secrets: inherit

  summarize:
    runs-on: ubuntu-latest
    needs: [smoke-staging, regression-staging]  # wait for both reusable jobs to finish
    if: always()  # run even if one of them failed — we always want the summary
    steps:
      - run: |
          echo "Smoke:      ${{ needs.smoke-staging.outputs.test-summary }}"  # read outputs from the reusable workflow job using needs.<job-id>.outputs.<name>
          echo "Regression: ${{ needs.regression-staging.outputs.test-summary }}"
