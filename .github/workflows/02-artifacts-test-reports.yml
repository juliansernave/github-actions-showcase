name: "02 · Artifacts & Test Reports"

# Key concepts:
#   upload-artifact  — persist files between jobs and beyond the run
#   download-artifact — consume those files in a downstream job
#   if: always()      — upload even when the job fails (critical for test reports)
#   retention-days    — how long GitHub stores the artifact

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - name: Run tests (JUnit + coverage output)
        run: npm test
        # Allow the step to fail — we still want to upload the report below.
        # Note: continue-on-error makes the step's conclusion 'success',
        # but outcome will be 'failure'. See 06-conditionals.yml for details.
        continue-on-error: true

      - name: Run coverage
        run: npm run test:coverage
        continue-on-error: true

      # THE key pattern: if: always() ensures the artifact is uploaded even
      # when tests fail. Without this, a red build produces no downloadable report.
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  analyze-report:
    runs-on: ubuntu-latest
    needs: run-tests
    # Also runs even if run-tests failed — the whole point is to read the report
    if: always()
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Parse JUnit XML and write step summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/junit.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' test-results/junit.xml | head -1 | grep -o '[0-9]*' || echo "?")
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results/junit.xml | head -1 | grep -o '[0-9]*' || echo "?")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | ${TESTS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "_No junit.xml found — tests may not have produced output._" >> $GITHUB_STEP_SUMMARY
          fi
