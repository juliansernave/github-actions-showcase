name: "02 · Artifacts & Test Reports"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm test
        continue-on-error: true

      - name: Upload JUnit results
        if: always()  # upload even when tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  analyze-report:
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Write step summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/junit.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' test-results/junit.xml | head -1 | grep -o '[0-9]*' || echo "?")
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results/junit.xml | head -1 | grep -o '[0-9]*' || echo "?")
            echo "| Total | Failures |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| ${TESTS} | ${FAILURES} |" >> $GITHUB_STEP_SUMMARY
          fi
