name: "02 · Artifacts & Test Reports"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm test
        continue-on-error: true  # lets the workflow keep going even if tests fail — we still want to upload the report

      - name: Upload JUnit results
        if: always()  # upload even if the test step above failed — this is the key pattern for test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-results  # artifact name — used to download it in the next job
          path: test-results/  # jest-junit writes the xml report here
          retention-days: 14  # keep for 2 weeks

      - name: Upload coverage
        if: always()  # same — upload even on failure
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/  # jest --coverage writes html and lcov reports here
          retention-days: 7

  analyze-report:
    runs-on: ubuntu-latest
    needs: run-tests  # wait for run-tests to finish before starting this job
    if: always()  # run this job even if run-tests failed
    steps:
      - uses: actions/download-artifact@v4  # download the artifact uploaded by the previous job
        with:
          name: test-results  # must match the name used in upload-artifact
          path: test-results/  # where to put the downloaded files on this runner

      - name: Write step summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY  # $GITHUB_STEP_SUMMARY is a special file — anything written here shows as a summary on the run page
          if [ -f test-results/junit.xml ]; then  # check the file actually exists before parsing
            TESTS=$(grep -o 'tests="[0-9]*"' test-results/junit.xml | head -1 | grep -o '[0-9]*' || echo "?")  # parse total test count from the xml attribute
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results/junit.xml | head -1 | grep -o '[0-9]*' || echo "?")  # parse failure count
            echo "| Total | Failures |" >> $GITHUB_STEP_SUMMARY  # markdown table header
            echo "|-------|----------|" >> $GITHUB_STEP_SUMMARY  # markdown table separator
            echo "| ${TESTS} | ${FAILURES} |" >> $GITHUB_STEP_SUMMARY  # actual values
          fi
