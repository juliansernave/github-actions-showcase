name: "05 · Reusable Workflow (Definition)"

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      test-suite:
        type: string
        default: "smoke"
      node-version:
        type: string
        default: "20"
    outputs:
      test-summary:
        value: ${{ jobs.test.outputs.summary }}

jobs:
  test:
    name: "[${{ inputs.environment }}] ${{ inputs.test-suite }}"
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.run.outputs.summary }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
      - run: npm install

      - name: Run suite
        id: run
        run: |
          npm run test:api
          echo "summary=${{ inputs.test-suite }} PASSED on ${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
        env:
          TARGET_ENV: ${{ inputs.environment }}
