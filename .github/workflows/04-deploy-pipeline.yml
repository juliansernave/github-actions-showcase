##
## A full deploy pipeline: smoke tests → staging → regression → production.
## Calls the reusable test runner (03) to validate before each deployment step —
## no test logic duplicated here, just orchestration.
## Production is gated by a required reviewer: the job pauses until someone approves.
## Configure reviewers at: Settings > Environments > production > Required reviewers
##

name: "04 · Deploy Pipeline"

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  smoke-tests:
    name: "Smoke tests"
    uses: ./.github/workflows/03-reusable-test-runner.yml  # delegate to the reusable runner — no setup logic here
    with:
      environment: staging
      test-suite: smoke
      browser: chromium
    secrets: inherit  # forward all secrets from this workflow to the reusable one automatically

  deploy-staging:
    runs-on: ubuntu-latest
    needs: smoke-tests  # only deploy if smoke tests passed
    environment:
      name: staging  # links this job to the 'staging' environment in GitHub settings
      url: https://staging.example.com  # shown as a clickable link on the run page and repo homepage
    steps:
      - run: echo "Deployed to staging ✅"
        # ${{ secrets.DATABASE_URL }} here resolves to the staging-scoped secret value

  regression-tests:
    name: "Regression tests"
    needs: deploy-staging  # run regression against staging after it's been deployed
    uses: ./.github/workflows/03-reusable-test-runner.yml
    with:
      environment: staging
      test-suite: regression
      browser: chromium
    secrets: inherit

  deploy-production:
    runs-on: ubuntu-latest
    needs: regression-tests  # only go to prod after regression passes
    environment:
      name: production  # if this environment has required reviewers, the job pauses here waiting for approval
      url: https://example.com
    steps:
      - run: echo "Deployed to production ✅"
        # ${{ secrets.DATABASE_URL }} here resolves to the production-scoped value — same name, different value from staging
