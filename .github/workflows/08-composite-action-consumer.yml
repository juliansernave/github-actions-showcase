name: "08 · Composite Action"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-node20:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup test environment
        id: setup
        uses: ./.github/actions/setup-test-env
        with:
          node-version: "20"

      - run: echo "Cache hit ${{ steps.setup.outputs.cache-hit }} — Node ${{ steps.setup.outputs.node-version-used }}"
      - run: npm test

  test-node18:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-test-env
        with:
          node-version: "18"
      - run: npm test
