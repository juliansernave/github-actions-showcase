name: "04 · Job Outputs"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.results.outputs.tests_passed }}
      tests-failed: ${{ steps.results.outputs.tests_failed }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install

      - name: Run tests and write outputs
        id: results
        run: |
          npm test -- --json --outputFile=jest-output.json 2>/dev/null || true
          PASSED=$(node -e "try { const r=require('./jest-output.json'); process.stdout.write(String(r.numPassedTests||0)) } catch { process.stdout.write('0') }")
          FAILED=$(node -e "try { const r=require('./jest-output.json'); process.stdout.write(String(r.numFailedTests||0)) } catch { process.stdout.write('0') }")
          echo "tests_passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "tests_failed=${FAILED}" >> "$GITHUB_OUTPUT"

  post-summary:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - run: |
          echo "## Test Run" >> "$GITHUB_STEP_SUMMARY"
          echo "| ✅ Passed | ❌ Failed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ needs.run-tests.outputs.tests-passed }} | ${{ needs.run-tests.outputs.tests-failed }} |" >> "$GITHUB_STEP_SUMMARY"
