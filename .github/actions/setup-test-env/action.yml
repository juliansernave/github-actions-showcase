##
## Composite action — shared Node.js setup used by 02-features.yml.
##
## A composite action packages repeated steps so you don't copy-paste
## checkout / setup-node / npm install into every workflow.
##

name: "Setup Test Environment"
description: "Node.js setup + npm install + step summary"

inputs:
  node-version:
    description: "Node.js version to use"
    default: "20"

outputs:
  cache-hit:
    description: "Whether the npm cache was restored"
    value: ${{ steps.setup-node.outputs.cache-hit }}
  node-version-used:
    description: "Resolved Node.js version"
    value: ${{ steps.setup-node.outputs.node-version }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"   # cache keyed on package-lock.json — same caching benefit as in a regular workflow

    - name: Install dependencies
      shell: bash
      run: npm install

    - name: Step summary
      shell: bash
      run: |
        echo "| Node | Cache hit |" >> "$GITHUB_STEP_SUMMARY"
        echo "|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| \`${{ steps.setup-node.outputs.node-version }}\` | \`${{ steps.setup-node.outputs.cache-hit }}\` |" >> "$GITHUB_STEP_SUMMARY"
