name: "Setup Test Environment"
description: "Node.js setup + install + optional .env.test + step summary"

inputs:
  node-version:
    description: "Node.js version"
    default: "20"
  working-directory:
    description: "Directory to run install in"
    default: "."
  install-command:
    description: "Install command"
    default: "npm install"
  env-vars:
    description: ".env.test content (pass as secret)"
    required: false

outputs:
  cache-hit:
    description: "Whether npm cache was restored"
    value: ${{ steps.setup-node.outputs.cache-hit }}
  node-version-used:
    description: "Resolved Node.js version"
    value: ${{ steps.setup-node.outputs.node-version }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.install-command }}

    - name: Write .env.test
      if: ${{ inputs.env-vars != '' }}
      shell: bash
      env:
        ENV_CONTENT: ${{ inputs.env-vars }}
      run: printf '%s' "$ENV_CONTENT" > .env.test

    - name: Step summary
      shell: bash
      run: |
        echo "| Node | Cache hit |" >> $GITHUB_STEP_SUMMARY
        echo "|------|-----------|" >> $GITHUB_STEP_SUMMARY
        echo "| \`${{ steps.setup-node.outputs.node-version }}\` | \`${{ steps.setup-node.outputs.cache-hit }}\` |" >> $GITHUB_STEP_SUMMARY
